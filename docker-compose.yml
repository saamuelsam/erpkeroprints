
services:
  # ─────────────────────────────────────────
  # PHP-FPM Application
  # ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: masterprint_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - masterprint_net
    depends_on:
      db:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Nginx Web Server
  # ─────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: masterprint_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - masterprint_net
    depends_on:
      - app

  # ─────────────────────────────────────────
  # MySQL 8 Database
  # ─────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: masterprint_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: masterprint_erp
      MYSQL_USER: masterprint
      MYSQL_PASSWORD: secret123
      MYSQL_ROOT_PASSWORD: rootsecret123
    ports:
      - "3307:3306"
    volumes:
      - masterprint_db_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - masterprint_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "masterprint", "-psecret123"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # phpMyAdmin (acesso visual ao banco)
  # ─────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: masterprint_pma
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: masterprint
      PMA_PASSWORD: secret123
    ports:
      - "8081:80"
    networks:
      - masterprint_net
    depends_on:
      db:
        condition: service_healthy

networks:
  masterprint_net:
    driver: bridge

volumes:
  masterprint_db_data:
    driver: local
